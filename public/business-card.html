<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daury — Business Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wdth,wght@12..96,75..100,300..800&family=Geist+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  /* ── Variables exactas del landing (light mode) ── */
  :root {
    --bg:       #F6F6F4;
    --bg-2:     #ECEDE9;
    --bg-elev:  #FFFFFF;
    --ink:      #0A0B12;
    --ink-2:    #2A2E40;
    --ink-soft: rgba(10, 11, 18, 0.60);
    --ink-mute: rgba(10, 11, 18, 0.34);
    --rule:     rgba(10, 11, 18, 0.07);
    --rule-2:   rgba(10, 11, 18, 0.12);
    --blue:     #2358E8;
    --violet:   #6E3BD6;
    /* Gradiente sin verde: azul → índigo → violeta */
    --grad-start: #2358E8;
    --grad-mid:   #4B36EC;
    --grad-end:   #7B3BD6;
  }

  @page { size: 85.6mm 54mm; margin: 0; }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg-2);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
    padding: 48px 40px;
  }
  .label {
    font-family: 'Geist Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-mute);
    align-self: flex-start;
    margin-left: calc(50vw - 85.6mm / 2 - 40px);
  }

  /* ── Card shell ── */
  .card {
    width: 85.6mm;
    height: 54mm;
    position: relative;
    overflow: hidden;
    border-radius: 3mm;
    background: var(--bg);
    box-shadow:
      0 1px 2px rgba(10,11,18,0.04),
      0 8px 32px -12px rgba(10,11,18,0.12);
  }

  /* ── Blobs: solo azul, como el hero del landing ── */
  .blobs { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
  .blob  { position: absolute; border-radius: 50%; }

  /* Blob azul principal — top-left, atmosphérico */
  .blob-blue {
    width: 72mm; height: 72mm;
    background: var(--blue);
    filter: blur(18mm);
    top: -24mm; left: -20mm;
    opacity: 0.20;
  }
  /* Blob índigo — complementa el gradiente, muy sutil abajo-derecha */
  .blob-indigo {
    width: 44mm; height: 44mm;
    background: #4B36EC;
    filter: blur(16mm);
    bottom: -16mm; right: -10mm;
    opacity: 0.08;
  }

  /* ── Card content ── */
  .card-inner {
    position: relative;
    z-index: 1;
    width: 100%;
    height: 100%;
    padding: 4.5mm 5.5mm;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  /* ── Logo ── */
  .logo-row { display: flex; align-items: center; gap: 1.8mm; }

  /* Mark más pequeño, gradiente suave para combinar con fondo claro */
  .logo-mark { opacity: 0.72; flex-shrink: 0; }

  .wordmark {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 500;
    font-size: 4.8mm;
    letter-spacing: -0.03em;
    line-height: 1;
    color: var(--ink);
  }

  /* Línea gradiente: azul → índigo → violeta */
  .grad-rule {
    height: 0.32mm;
    width: 100%;
    margin-top: 1.6mm;
    background: linear-gradient(90deg, var(--grad-start) 0%, var(--grad-mid) 48%, var(--grad-end) 100%);
    opacity: 0.42;
    border-radius: 1mm;
  }

  /* ── Texto central ── */
  .text-block { display: flex; flex-direction: column; gap: 2mm; }

  .eyebrow-text {
    font-family: 'Geist Mono', monospace;
    font-size: 1.75mm;
    letter-spacing: 0.13em;
    text-transform: uppercase;
    color: var(--ink-mute);
    line-height: 1.3;
  }

  /* Dos estilos de tipografía igual que el Hero del landing:
     title_a → Bricolage 500 normal   (--ink)
     title_b → Bricolage 400 italic   (--ink-2) */
  .title-block {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: 4.4mm;
    letter-spacing: -0.025em;
    line-height: 1.08;
  }
  .title-a { font-weight: 500; color: var(--ink); }
  .title-b { font-weight: 400; font-style: italic; color: var(--ink-2); }

  .lead-text {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: 2.15mm;
    font-weight: 400;
    line-height: 1.45;
    color: var(--ink-soft);
    max-width: 70mm;
  }

  /* ── URL row ── */
  .bottom-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .url {
    font-family: 'Geist Mono', monospace;
    font-size: 2.1mm;
    letter-spacing: 0.08em;
    color: var(--ink-mute);
  }
  /* Dot: gradiente azul-violeta en lugar del verde */
  .dot-accent {
    width: 1.5mm; height: 1.5mm;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--grad-start), var(--grad-end));
    box-shadow: 0 0 1.5mm rgba(75, 54, 236, 0.35);
  }

  /* ── REVERSO ── */
  .card-back .blob-blue   { top: -26mm; right: -16mm; left: auto; opacity: 0.16; }
  .card-back .blob-indigo { bottom: -18mm; left: -10mm; right: auto; opacity: 0.07; }

  .card-back .card-inner {
    align-items: center;
    justify-content: center;
    gap: 3mm;
  }

  .qr-wrap {
    width: 22mm; height: 22mm;
    border-radius: 1.2mm;
    overflow: hidden;
    padding: 1mm;
    background: var(--bg-elev);
    box-shadow: 0 1px 4px var(--rule-2);
  }
  .qr-wrap canvas { width: 100% !important; height: 100% !important; display: block; }

  .back-grad-line {
    width: 16mm; height: 0.32mm;
    background: linear-gradient(90deg, var(--grad-start) 0%, var(--grad-mid) 48%, var(--grad-end) 100%);
    opacity: 0.40;
    border-radius: 1mm;
  }
  .back-hint {
    font-family: 'Geist Mono', monospace;
    font-size: 1.85mm;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-mute);
  }
  .back-url {
    font-family: 'Geist Mono', monospace;
    font-size: 2.2mm;
    letter-spacing: 0.10em;
    color: var(--ink-soft);
  }

  /* ── Print ── */
  @media print {
    body { background: none; padding: 0; gap: 0; display: block; }
    .label { display: none; }
    .card {
      border-radius: 0;
      box-shadow: none;
      break-after: page;
      page-break-after: always;
    }
    * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }
</style>
</head>
<body>

<span class="label">Frente</span>

      </div>
      <div class="grad-rule"></div>
    </div>

    <!-- Texto: igual que el hero del landing reescrito -->
    <div class="text-block">
      <span class="eyebrow-text">La plataforma para quienes cuidan</span>
      <div class="title-block">
        <span class="title-a">Cuidar, sin perder</span><br>
        <span class="title-b">el hilo.</span>
      </div>
      <p class="lead-text">Rutinas, seguimiento y coordinación para cuidadores y familias.</p>
    </div>

    <!-- URL -->
    <div class="bottom-row">
      <span class="url">daury.cloud</span>
      <span class="dot-accent"></span>
    </div>

  </div>
</div>

<span class="label">Reverso</span>

  <div class="blobs">

    <span class="back-hint">Conocé Daury</span>
